<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA | Sistemik Derin Analiz</title>
    <style>
        :root { --gold: #c5a059; --dark: #1a252f; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', serif; background: var(--light); margin: 0; color: #333; line-height: 1.6; }
        .nav { background: var(--dark); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        .container { max-width: 600px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .live-timer { text-align: center; font-size: 13px; color: var(--gold); margin-bottom: 20px; font-weight: bold; }
        .step { display: none; } .active { display: block; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input, select { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: var(--gold); color: white; font-size: 16px; }
        #report-box { background: #fffcf0; padding: 25px; border-radius: 12px; border: 1px solid #f1e6b2; white-space: pre-line; }
        .copyright { text-align: center; font-size: 11px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>

<div class="nav"><div style="font-size: 22px; font-weight: bold; letter-spacing: 2px;">KBA SİSTEMİK ANALİZ</div></div>

<div class="container">
    <div class="card">
        <div id="clock" class="live-timer">Vakit Hesaplanıyor...</div>

        <div id="s1" class="step active">
            <label>Sorgu Sahibi ve Kod:</label>
            <div style="display: flex; gap: 10px;"><input type="text" id="name1" placeholder="İsim"><input type="number" id="code1" placeholder="Kod"></div>
            <label>Muhatap ve Kod:</label>
            <div style="display: flex; gap: 10px;"><input type="text" id="name2" placeholder="İsim"><input type="number" id="code2" placeholder="Kod"></div>
            <button class="btn" onclick="analizBaslat()">ANALİZİ BAŞLAT</button>
        </div>

        <div id="s2" class="step">
            <p><strong>Sistemik Teşhis:</strong> Şu an baskın olan davranış halini seçiniz:</p>
            <select id="hal_select"></select>
            <button class="btn" onclick="itidalSecim()">İTİDAL KAPISINA GEÇ</button>
        </div>

        <div id="s3" class="step">
            <p><strong>Şifa Kapısı:</strong> Bu durumu dengeleyecek erdemi seçiniz:</p>
            <select id="itidal_select"></select>
            <button class="btn" onclick="raporOlustur()">DETAYLI RAPORU MÜHÜRLE</button>
        </div>

        <div id="s4" class="step">
            <div id="report-box"></div>
            <button class="btn" style="margin-top:20px; background:var(--dark);" onclick="location.reload()">YENİ SORGULAMA</button>
        </div>
    </div>
    <div class="copyright">©️ 2026 KBA - Her Hakkı Mahfuzdur.</div>
</div>

<script>
    const KBA_DATA = {
        planets: {
            "Güneş": { esma: "Ya Hayy - Ya Kayyum", etki: "Dışsallıktan Celal", ifrat: ["Egoizm", "Zalimlik"], tefrit: ["Korku", "Kimlik Kaybı"], itidal: ["Adalet", "Varlık Bilinci"] },
            "Ay": { esma: "Ya Rahman - Ya Rahim", etki: "İçsellikten Cemal", ifrat: ["Bağımlılık", "Değişkenlik"], tefrit: ["Katılık", "Duygusuzluk"], itidal: ["Şefkat", "Ruhsal Denge"] },
            "Mars": { esma: "Ya Melik - Ya Kuddüs", etki: "Dışsallıktan Cemal", ifrat: ["Hükmedicilik", "Baskıcılık"], tefrit: ["Güvensizlik", "Zayıflık"], itidal: ["Cesaret", "Cömertlik"] },
            "Merkür": { esma: "Ya Ali - Ya Azim", etki: "İçsellikten Celal", ifrat: ["Kurnazlık", "Çabuk Parlama"], tefrit: ["Karışıklık", "İfade Bozukluğu"], itidal: ["Doğru İfade", "Empati"] },
            "Jüpiter": { esma: "Ya Alim - Ya Hakim", etki: "Dışsallıktan Celal", ifrat: ["Kibir", "Yargılayıcılık"], tefrit: ["Kararsızlık", "Depresiflik"], itidal: ["Şeffaflık", "Saygı"] },
            "Venüs": { esma: "Ya Latif - Ya Vedud", etki: "İçsellikten Cemal", ifrat: ["Duygusal Şantaj", "Aşırı İstek"], tefrit: ["Sevgisizlik", "İçe Kapanma"], itidal: ["Şartsız Sevgi", "Hüsn-ü Zan"] },
            "Satürn": { esma: "Ya Fettah - Ya Rezzak", etki: "Dışsallıktan Celal", ifrat: ["Katı Kuralcılık", "Cimrilik"], tefrit: ["Sorumsuzluk", "Disiplinsizlik"], itidal: ["Sabır", "Teslimiyet"] }
        },
        order: ["Güneş", "Ay", "Mars", "Merkür", "Jüpiter", "Venüs", "Satürn"]
    };

    let state = { gez: "" };

    // CANLI ZAMAN MOTORU
    function updateClock() {
        const d = new Date();
        const hour = d.getHours();
        const dayIdx = d.getDay();
        state.gez = KBA_DATA.order[(dayIdx + hour) % 7];
        document.getElementById('clock').innerText = ⁠ Vakit: ${state.gez} Saati | ${KBA_DATA.planets[state.gez].esma} ⁠;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function analizBaslat() {
        state.n1 = document.getElementById('name1').value;
        state.c1 = parseInt(document.getElementById('code1').value);
        state.c2 = parseInt(document.getElementById('code2').value);
        if(!state.n1 || isNaN(state.c1)) return alert("Eksik bilgi!");

        state.tip = (state.c1 === state.c2) ? (state.c1 % 2 === 0 ? "tefrit" : "ifrat") : (state.c1 % 2 !== state.c2 % 2 ? "ifrat" : "tefrit");
        const list = KBA_DATA.planets[state.gez][state.tip];
        document.getElementById('hal_select').innerHTML = list.map(h => ⁠ <option value="${h}">${h}</option> ⁠).join('');
        jump(1, 2);
    }

    function itidalSecim() {
        document.getElementById('itidal_select').innerHTML = KBA_DATA.planets[state.gez].itidal.map(h => ⁠ <option value="${h}">${h}</option> ⁠).join('');
        jump(2, 3);
    }

    function raporOlustur() {
        const h = document.getElementById('hal_select').value;
        const i = document.getElementById('itidal_select').value;
        const info = KBA_DATA.planets[state.gez];

        document.getElementById('report-box').innerHTML = `
            <center><b>KBA SİSTEMİK ANALİZ RAPORU</b></center><hr>
            <b>Sayın ${state.n1},</b>
            
            Şu an <b>${state.gez}</b> vaktinin tesiri altındasınız. Bu vakit, <b>"${info.esma}"</b> Esma terkibi üzerinden üzerinizde <b>"${info.etki}"</b> bir enerji oluşturmaktadır.
            
            <b>SİSTEMİK TEŞHİS:</b>
            Sorgulanan veriler ışığında, bu etkinin sizde bir <b>"${state.tip.toUpperCase()}"</b> sapmasına neden olduğu görülmektedir. Yaşadığınız sorunun temelinde yatan davranış biçimi: <b>"${h}"</b> halidir.
            
            <b>ŞİFA VE İTİDAL REÇETESİ:</b>
            Sisteminizdeki bu dengesizliği gidermek ve problemi çözüme kavuşturmak için; seçmiş olduğunuz <b>"${i}"</b> itidal erdemini kuşanmanız gerekmektedir. 
            
            Bu bilinçle hareket ettiğinizde, <b>${state.gez}</b> vaktinin celali/cemali etkisi sisteminizde dengeye (itidale) kavuşacak ve yaşadığınız tıkanıklık son bulacaktır.
        `;
        jump(3, 4);
    }

    function jump(a, b) {
        document.getElementById('s'+a).style.display='none';
        document.getElementById('s'+b).style.display='block';
    }
</script>
</body>
</html>
